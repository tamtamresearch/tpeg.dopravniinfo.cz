name: Deploy VitePress site to Pages

on:
    push:
        branches: [main, feat/ci]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - name: Setup Pages
              uses: actions/configure-pages@v6
              with:
                  enablement: true
            - name: Check for custom domain
              id: check-domain
              run: |
                  CNAME=$(gh api repos/${{ github.repository }}/pages --jq '.cname // empty')
                  if [ -n "$CNAME" ]; then
                    echo "has_custom_domain=true" >> $GITHUB_OUTPUT
                    echo "Custom domain detected: $CNAME"
                  else
                    echo "has_custom_domain=false" >> $GITHUB_OUTPUT
                    echo "No custom domain set"
                  fi
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            - name: Install dependencies and build pages
              env:
                  # Set repository variable VITE_PRERELEASE_BANNER (Settings -> Secrets and
                  # variables -> Actions -> Variables) to any non-empty value to show the
                  # pre-release banner. Unset = hidden.
                  VITE_PRERELEASE_BANNER: ${{ vars.VITE_PRERELEASE_BANNER }}
              run: |
                  npm ci
                  if [ "${{ steps.check-domain.outputs.has_custom_domain }}" = "false" ]; then
                    export VITEPRESS_BASE=/${GITHUB_REPOSITORY#*/}/
                  fi
                  npm run docs:build
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: docs/.vitepress/dist

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        needs: build
        runs-on: ubuntu-latest
        name: Deploy
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5

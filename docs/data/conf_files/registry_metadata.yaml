metadata_date: 2025-10-09
language: [cs, en]
contacts:
    - role:
          cs: Žádost o zařazení do registru dopravních informací
          en: Registration of a data provider
      persons:
          - "NDIC/Filip Tyc"
    - role:
          cs: Technická podpora a připomínky k realizaci registru
          en: Technical support and issues resolution
      persons:
          - "TTR/Petr Bures"
version_history:
    - id: "1.25"
      type: S+C
      date: 2025-10-09
      description:
          "cs": |
              Přidání struktury do registru pro linkování na zdroj do popis zdroje a přidání data aktualizace do popisu formátu.

              - Přidání **zdrojů**: [DATEX II - Proměnné dopravní značení - pevné v2](../sources/cz-ndic_d2-vms-fixed-v2.md) včetně aktualizovaného formátu; [DATEX II - Proměnné dopravní značení (předdefinované polohy) - pevné značení v2](../sources/cz-ndic_d2-vms-table-fixed-v2.md) včetně nového formátu a [DDR - Zimní sjízdnost (snímek)](../sources/cz-ndic_ddr-winter-pull.md).
              - Odebrání zdrojů, které již nejsou dále poskytovány: TMC lokační tabulka v9.0; DATEX II - Hustota provozu; LOD - Dopravní informace souvisící s bezpečností silničního provozu pomocí SPARQL
              - Úprava většiny zdrojů, aktualizace jejich stavu, přidání linku na stažení, aktualizace informace o propojených statických datových sadách, přidání data aktualizace

          "en": |
              Addition of a structure to the registry for linking to the source in the source description and inclusion of the update date in the format description

              - Added sources: [DATEX II - Variable Message Signs – fixed v2](../sources/cz-ndic_d2-vms-fixed-v2.md) including the updated format; [DATEX II - Variable Message Signs (predefined positions) – fixed signage v2](../sources/cz-ndic_d2-vms-table-fixed-v2.md) including the new format and [DDR - Winter Road Conditions (snapshot)](../sources/cz-ndic_ddr-winter-pull.md)
              - Removed no longer provided sources: TMC Location Table v9.0; DATEX II – Traffic Status; LOD - Safety-related road traffic information via SPARQL.
              - Modified most sources: Updated their status, Added download links, Updated information on linked static datasets, Included update dates.
    - id: "1.24"
      type: S
      date: 2025-05-29
      description:
          "cs": |
              Opravy chyb kódu registru vzniklých přenosem do nové verze Python, viz předchozí verze. Úpravy a zjednodušování kódu registru, zapojení kontroly chybných odkazů a automatická tvorba testovací stránky ha platformě GitHub.
          "en": |
              Fixes for registry code errors resulting from the transfer to the new Python version, see the previous version. Adjustments and simplifications of registry code, integration of incorrect link checking, and automatic creation of a test page on the GitHub platform.
    - id: "1.23"
      type: S
      date: 2025-05-21
      description:
          "cs": |
              Upgrade podvozku registru z py27 do py3.13+ a s tím související upgrade knihoven. Oprava nefunkčních linků a drobné redakční opravy.
          "en": |
              Upgrade of the registry back end from Python 2.7 to Python 3.13+ and the related library upgrades. Fixing broken links and making minor editorial corrections.
    - id: "1.22"
      type: C
      date: 2024-03-01
      description:
          "cs": |
              Přidání licenčního prohlášení k metadatům nacházejícím se v NAPu, do poznámky.
          "en": |
              Adding a license statement to the metadata found in NAP, in the note.
    - id: "1.21"
      type: C
      date: 2024-02-29
      description:
          "cs": |
              Přidání prohlášení o shodě ke zdroji [NeTEx - Informace o jízdních řádech](../sources/cz-mdcr_NeTEx-timetables-v1.0.md)
          "en": |
              Adding self declaration of conformance of the source [NeTEx - Timetable Information](../sources/cz-mdcr_NeTEx-timetables-v1.0.md).
    - id: "1.20"
      type: C
      date: 2023-11-27
      description:
          "cs": |
              Změny uri **zdrojů** jako příprava na přidání verzí podle Global Networku:

              - úprava uri zdroje cz-ndic_d2-pls-weather na cz-ndic_d2-pls-weather-v1.1 [DATEX II - Počasí (předdefinované polohy) v1.1](../sources/cz-ndic_d2-pls-weather-v1.1.md) 
              - úprava uri cz-ndic_d2-pls-traffic-status na cz-ndic_d2-pls-traffic-status-v1.1 [DATEX II - Hustota provozu (předdefinované polohy) v1.1 ](../sources/cz-ndic_d2-pls-traffic-status-v1.1.md) 
              - úprava uri zdroje cz-ndic_d2-pls-fcd na cz-ndic_d2-pls-fcd-v1.1 [DATEX II - FCD data (předdefinované polohy) v1.1](../sources/cz-ndic_d2-pls-fcd-v1.1.md)

          "en": |
              Changes to uri **resources** in preparation for adding Global Network versions:

              - edit source uri cz-ndic_d2-pls-weather to cz-ndic_d2-pls-weather-v1.1 [DATEX II - Weather (predefined locations) v1.1](../sources/cz-ndic_d2-pls-weather-v1.1.md) 
              - edit uri cz-ndic_d2-pls-traffic-status to cz-ndic_d2-pls-traffic-status-v1.1 [DATEX II - Traffic Status (predefined locations) v1.1 ](../sources/cz-ndic_d2-pls-traffic-status-v1.1.md) 
              - edit source uri cz-ndic_d2-pls-fcd to cz-ndic_d2-pls-fcd-v1.1 [DATEX II - FCD data (predefined locations) v1.1](../sources/cz-ndic_d2-pls-fcd-v1.1.md)
    - id: "1.19"
      type: C
      date: 2023-11-13
      description:
          "cs": Přidání anglické dokumentce formátu zdroje [NeTEx - Informace o jízdních řádech](../sources/cz-mdcr_NeTEx-timetables-v1.0.md).
          "en": Adding English documentation to the format of the source [NeTEx - Timetable Information](../sources/cz-mdcr_NeTEx-timetables-v1.0.md).
    - id: "1.18"
      type: C
      date: 2023-11-03
      description:
          "cs": Odebrání neaktuálních zdrojů (zimní zpravodajství), přidání LTv10.1 a jejich propojení do všech zdrojů které LT používají, rozdělení zdroje VMS na fixní značky a mobilní vozíky a aktualizace tabulky VMS (oba zdroje povýšeny na v1.1), přidání formátů vms ve verzi 1.1. Drobné textové korekce.
          "en": Removal of outdated sources (winter news), adding LTv10.1 and linking them to all sources that use LT, splitting the VMS source into fixed and mobile and updating the VMS table, both sources upgraded to v1.1, added formats of VMS in v1.1. Minor text corrections.
    - id: "1.17"
      type: S
      date: 2023-10-23
      description:
          "cs": Změna titulní stránky, přidání informací do seznamů zdrojů, drobné korekce textu. Přehled zdrojů rozdělen do tabulek podle Delegovaných nařízení (jen v české verzi, aj verze zůstala při původním kompaktnějším rozložení).
          "en": Change of introductory page, addition of key words into source listings, minor textual corrections. List of resources divided into tables according to the Delegated Regulations (only in the Czech version, the Czech version remains in the original more compact layout).
    - id: "1.16"
      type: C+S
      date: 2023-10-22
      description:
          "cs": |
              Funkční změny:

              - přidání informace o modelu (DATEX...) do seznamu zdrojů
              - přidání informace o modelu do zdroje, část "obecné parametry"
              - přidání informace o rozšíření modelu do formátu, část "obecné parametry"
              - přidání části pro dokumentaci mimo registr do formátu část "Odkazovaná dokumentace formátu"

              Obsahové změny, **poskytovatelé**:

              - přidání poskytovatele [MD ČR](../providers/cz-mdcr.md)

              Obsahové změny, přidání nového **zdroje**:

              - přidání zdroje [NeTEx - Informace o jízdních řádech](../sources/cz-mdcr_NeTEx-timetables-v1.0.md) včetně, formátu.

          "en": |
              Functional changes:

              - adding model information (DATEX...) to the list of resources
              - adding model information to the resource, "general parameters" section
              - adding model extension information to the format, section "general parameters"
              - addition of a section for off-register documentation to the format section "Referenced format documentation"

              Content changes, **providers**:

              - adding provider [MD CR](../providers/cz-mdcr.md)

              Content changes, addition of new **resource**:

              - adding a resource [NeTEx - Timetable Information](../sources/cz-mdcr_NeTEx-timetables-v1.0.md) including, format.

    - id: "1.15"
      type: C
      date: 2023-09-23
      description:
          "cs": Aktualizace dokumentace D2 VMS (x-source:cz-ndic_d2-vms-table).
          "en": Update od profile of D2 VMS table (x-source:cz-ndic_d2-vms-table)
    - id: "1.14"
      type: C+S
      date: 2023-03-13
      description:
          "cs": Dodání dokumentace vysílání RDS-TMC jako samostatného zdroje v gesci NDIC; doplnění dokumentace k D2 FCD v2 (x-source:cz-ndic_d2-fcd-v2); doplnění vzorů u řady zdrojů.
          "en": Adding of RDS-TMC broadcast documentation as a separate source under the NDIC sources; addition of documentation to D2 FCD v2 (x-source:cz-ndic_d2-fcd-v2); addition of patterns for a number of sources.
    - id: "1.13"
      type: C
      date: 2023-03-09
      description:
          "cs": Dodání formátu ke zdroji DDR FCD v2 (x-source:cz-ndic_ddr-fcd-v2), nové prohlášení NDIC o shodě a drobné úpravy rozhraní.
          "en": Adding of DDR FCD v2 (x-source:cz-ndic_ddr-fcd-v2), new declaration of compliance and small interface changes.
    - id: "1.12"
      type: C
      date: 2022-09-27
      description:
          "cs": Dodání zdroje LOD - Dopravní informace souvisící s bezpečností silničního provozu pomocí SPARQL (x-source:cz-ndic_lod-srti-sparql) poskytujícího SRTI ve formě otevřených propojených dat.
          "en": Adding of LOD - Road Safety Related Traffic Information resource using SPARQL (x-source:en-ndic_lod-srti-sparql) providing SRTI in the form of linked open data.
    - id: "1.11"
      type: C
      date: 2022-02-22
      description:
          "cs": Dodání zdroje NDIC FCD v2 (DATEX II a DDR) poskytujícího odděleně informace pro nákladní a osobní vozidla.
          "en": Adding NDIC FCD data source v2 (DATEX II and DDR) providing fcd information separately by the vehicle type (lorry, car).
    - id: "1.10"
      type: C
      date: 2022-02-21
      description:
          "cs": Aktualizace protokolů u zdrojů NDIC, tak aby odpovídaly nově nasazeným způsobům poskytování (PULL i PUSH) v rámci zprovoznění [registru odběrů](https://mobilitydata.rsd.cz).
          "en": Update of protocols for NDIC data sources to match the newly deployed provisioning methods (PULL and PUSH) as part of the commissioning of the [subscription registry](https://mobilitydata.rsd.cz).
    - id: "1.9"
      type: C
      date: 2022-02-11
      description:
          "cs": Doplnění dynamických zdrojů typu snímek (x-source:cz-ndic_d2-common-pull, x-source:cz-ndic_ddr-common-pull), nového popisu protokolu pull (x-protocol:cz-ndic_pull-v1.1), statických zdrojů k dynamickým publikacím (x-source:cz-ndic_d2-pls-weather, x-source:cz-ndic_d2-pls-traffic-status, x-source:cz-ndic_d2-pls-traffic-status, x-source:cz-ndic_d2-pls-fcd), aktualizace odkazu na zdroje lokačních tabulek a nově přidané zdroje stávajících dynamických publikací, odstranění generického statického zdroje a nepoužívaného zdroje cestovních časů (cz-ndic_d2-predefined-location-set and cz-ndic_d2-travel-time).
          "en": Addition dynamic snapshot sources (x-source:cz-ndic_d2-common-pull, x-source:cz-ndic_ddr-common-pull), new protocol (x-protocol:cz-ndic_pull-v1.1), new static sources for existing dynamic sources (x-source:cz-ndic_d2-pls-weather, x-source:cz-ndic_d2-pls-traffic-status, x-source:cz-ndic_d2-pls-traffic-status, x-source:cz-ndic_d2-pls-fcd), update of existing dynamic sources for actual static sets used, removing obsolete sources (cz-ndic_d2-predefined-location-set and cz-ndic_d2-travel-time).
    - id: "1.8"
      type: C+S
      date: 2022-02-10
      description:
          "cs": Doplnění zdrojů pro publikaci statických informací o odpočívkách (dříve publikované prostřednictvím evropského datového portálu). Doplnění možnosti více API ke zdroji a slovního popisu poslední aktualizace dat.
          "en": Addition of sources for publication of intelligent truck parking (formerly published by European data portal). Adding the possibility of more APIs per source and last update of the dataset.
    - id: "1.7"
      type: C+S
      date: 2022-02-01
      description:
          "cs": Doplnění zdrojů pro publikaci proměnného dopravního značení (dynamický a statický) a doplnění metadat o specifikaci modelu dat, zkrácení dlouhých názvů zdrojů dat typu DATEX II.
          "en": Addition of sources for publication of variable message signs (static and dynamic) and addition of metadata with data model specification, shortening of long names of DATEX II data sources.

name:
    "cs": Dotazovací rozhraní SPARQL
    "en": SPARQL service interface
version_info:
    version: v1.0
    publish_date: 2021-07-01
interface: HTTP/HTTPS
communication_method: SPARQL
description:
    "cs": |
        Pro provádění dotazů je nutné znát jazyk SPARQL, který definovala organizace W3C [zde](https://www.w3.org/TR/rdf-sparql-query/).
    "en": |
        In order to perform queries it is necessary to know the SPARQL language, defined by the W3C [here](https://www.w3.org/TR/rdf-sparql-query/).
additional_description:
    "cs": |
        Pro usnadnění použití dotazů je vhodné znát použitou ontologii:

        - [https://cef.uv.es/lodroadtran18/def/transporte/dtx_srti](https://cef.uv.es/lodroadtran18/def/transporte/dtx_srti)
        - [https://cef.uv.es/lodroadtran18/def/transporte/dtx_srti/administrativeUnit](https://cef.uv.es/lodroadtran18/def/transporte/dtx_srti/administrativeUnit)
        - [https://cef.uv.es/lodroadtran18/def/transporte/dtx_srti/roads](https://cef.uv.es/lodroadtran18/def/transporte/dtx_srti/roads)

        Podrobná dokumentace rozhraní SPARQL je dostupná na [https://lod.tamtamresearch.com/docs](https://lod.tamtamresearch.com/docs)
    "en": |
        To facilitate queries it is advisable to know used ontology:

        - [https://cef.uv.es/lodroadtran18/def/transporte/dtx_srti](https://cef.uv.es/lodroadtran18/def/transporte/dtx_srti)
        - [https://cef.uv.es/lodroadtran18/def/transporte/dtx_srti/administrativeUnit](https://cef.uv.es/lodroadtran18/def/transporte/dtx_srti/administrativeUnit)
        - [https://cef.uv.es/lodroadtran18/def/transporte/dtx_srti/roads](https://cef.uv.es/lodroadtran18/def/transporte/dtx_srti/roads)

        Detailed documentation of the SPARQL interface is at [https://lod.tamtamresearch.com/docs](https://lod.tamtamresearch.com/docs).
publications:
    pdf: [cs, en]

# path is string format for final name. Using keys: uri, lang, pub_format
# uri is without the uri_type prefix as `x-format:` etc.
# icons are derived by rule: "img/pub_formats/{pub_format}.png"
pdf: "{uri}-{lang}.{pub_format}"
html-zip: "{uri}-{lang}.html.zip"
html: "{uri}-{lang}-{pub_format}/index.html"
htmlsinglepage: "{uri}-{lang}-{pub_format}/index.html"
docx: "{uri}-{lang}.{pub_format}"
zip: "{uri}-{lang}.{pub_format}" # zip: "{uri}.{pub_format}"


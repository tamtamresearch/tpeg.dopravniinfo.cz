description:
    "cs": Formát datového distribučního rozhraní (DDR) NDIC používaný pro poskytování běžných dopravních informací obecného charakteru (nehody, uzavírky, omezení, atp.) a stupňů provozu.
    "en": Format of data distribution interface (DDR) of NDIC used for publishing of common traffic information (accidents, closures, restrictions, etc.) and traffic statuses.

description:
    "cs": Popis dopravní informace sestávající z kódu (kódů) události z číselníku událostí daných normou ČSN EN 14819-2, lokalizovaných na položky v lokační tabulce (ČSN EN 14819-3) s uvedením trvání a doporučení objížďky.
    "en": Description of traffic information consisting of the code(s) of the event from the event list given by the ČSN EN 14819-2 standard, localized to items in the location table (ČSN EN 14819-3) with the duration and detour recommendation.

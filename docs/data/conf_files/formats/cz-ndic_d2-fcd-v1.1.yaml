name:
    "cs": DATEX II Elaborated Data Publication - FCD data
    "en": DATEX II Elaborated Data - FCD Data
version_info:
    version: "1.1"
    publish_date: 2022-02-01
encoding: UTF-8
syntax: XML
#schema.type
grammar: W3C XML Schema (XSD)
model: DATEX II
model_version: DATEX II v2.3
#model.profile_base
model_description: DATEX II v2.3/ElaboratedDataPublication
#extended_parts
model_extension: "elaboratedData, basicData/type=TrafficStatus, basicData/type=TraveTimeData"
description:
    "cs": Profil odvozený z DATEX II Elaborated Data Publication, verze 2.3, (dojezdové doby, rychlost a stupně dopravy) rozšířený o extenze typu B odvozené z tříd TrafficStatus (stupně dopravy a délka kolon) a TravelTimeData (počet vozidel, typy) používaný pro poskytování informací z plovoucích vozidel na předem dané sadě poloh. <b>Odděleně podle typu vozidla.</b>
    "en": Profile derived from DATEX II Elaborated Data Publication, version 2.3, (travel time, speed and traffic levels) extended by level B extensions of TrafficStatus (traffic levels and queue lengths) and TravelTimeData (number of vehicles, types) used to provide information from vehicle probes. on set of predefined locations. <b>Separately by a vehicle type.</b>
publications:
    html: [cs, en]
    pdf: [cs, en]
    zip: [en-cs]

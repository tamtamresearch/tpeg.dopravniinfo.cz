description:
    "cs": Zjednodušený popis silniční sítě, dle normy ČSN EN 14819-3, sestávající se z vzájemně logicky provázaných prvků reprezentovaných uzly či jinými významnými body silniční sítě, úseky silniční sítě a oblastmi. Těmto prvkům jsou v lokační tabulce přiděleny jednoznačné identifikátory, které jsou následně používány při popisování polohy dopravní události. Jak poskytovatel, tak odběratel musí disponovat těmito tabulkami, aby mohl přijaté dopravní informaci přiřadit její polohu. Přiložený dokument popisuje výměnný formát specifikovaný organizací TISA.
    "en": Simplified road network description according to CSN EN 14819-3, consisting of logically interconnected elements represented by nodes or other important points of the road network, sections of the road network and areas. These elements are assigned unique identifiers in the location table, which are then used to describe the location of a traffic event. Both the provider and the subscriber must have these tables in order to assign location to the received traffic information. The attached document describes the exchange format specified by TISA.

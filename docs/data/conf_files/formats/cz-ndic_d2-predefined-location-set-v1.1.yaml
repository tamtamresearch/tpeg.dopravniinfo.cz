name:
    "cs": DATEX II Predefined Location Publication - Předdefinované polohy
    "en": DATEX II Predefined Location Publication - Predefined Locations Set
version_info:
    version: "1.1"
    publish_date: 2018-04-23
encoding: UTF-8
syntax: XML
#schema.type
grammar: W3C XML Schema (XSD)
model: DATEX II
model_version: DATEX II v2.3
#model.profile_base
model_description: DATEX II v2.3/PredefinedLocationsPublication
#extended_parts
model_extension: "NetworkLocation"
description:
    "cs": Profil odvozený z DATEX II Predefined Location Publication, verze 2.3, používaný pro publikaci předdefinovaných poloh, které jsou využívány pro publikace stavových událostí (dojezdové doby, hustota provozu, situace v tunelu, obsazenost parkovišť atp.).
    "en": Profile derived from DATEX II Predefined Location Publication, version 2.3, used for publishing predefined locations allowing referencing of status oriented events (travel time, weather station reports, parking, tunnels, etc.).
additional_description:
    "cs": Verze 1.1 doplňuje ´OpenLR´ a ´pointByCoordinates´, ´feedType´ a zjednodušuje dokumentaci.
    "en": Version 1.1 adds ´OpenLR´ a ´pointByCoordinates´, ´feedType´ and simplifies the documentation.
publications:
    html: [cs, en]
    pdf: [cs, en]
    zip: [en-cs]

name:
    "cs": DATEX II Parking Table Publication – Tabulka parkovišť nákladních vozidel
    "en": DATEX II Parking Table Publication – Table of Truck Rest Areas
version_info:
    version: "1.0"
    publish_date: 2017-12-31
encoding: UTF-8
syntax: XML
#schema.type
grammar: W3C XML Schema (XSD)

description:
    "cs": Formát datového distribučního rozhraní (DDR) NDIC používaný pro poskytování informací z plovoucích vozidel (dojezdové doby, rychlost a stupně dopravy, stupně dopravy a délka kolon, počet vozidel, typy) na předem dané sadě poloh.
    "en": Format of data distribution interface (DDR) of NDIC used to provide information from floating car data (travel time, speed and traffic levels, traffic levels and queue lengths, number of vehicles, types) on set of predefined locations.
additional_description:
    "cs": <b>Formát není dokumentován, k dispozici je pouze vzorek a schéma. Pro informace o významu jednotlivých prvků a konceptů použijte dokumentaci k formátu verze 2.0 ([zde](../formats/cz-ndic_ddr-fcd-v2.0.md)).</b>
    "en": <b>The format is undocumented, only sample and schema are available. For more information about the individual attributes, elements and concepts please refer to format v 2.0 documentation ([here](../formats/cz-ndic_ddr-fcd-v2.0.md)).</b>

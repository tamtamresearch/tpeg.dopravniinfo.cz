name:
    "cs": NeTEx EPIP profil - jízdní řády
    "en": NeTEx EPIP timetable profile
version_info:
    version: "1.0"
    publish_date: 2023-07-28
encoding: UTF-8
syntax: XML
#schema.type
grammar: W3C XML Schema (XSD)
model: NeTEx
model_version: NeTEx v1.0.0
#model.profile_base
model_description: NeTEx v1.0.0/TimeTables
#extended_parts
model_extension: "none"
description:
    "cs": Profil EPIP odvozený z NeTEx, verze 1.0.0, používaný pro poskytování informací o veřejné hromadné dopravě, kompatibilní s "NeTEx full (v1.2), all rules" dle <a href="https://github.com/ITxPT/DATA4PTTools/">https://github.com/ITxPT/DATA4PTTools/</a>.
    "en": EPIP profile based on NeTEx, version 1.0.0, used for providing public transport (passenger) information, compatible with "NeTEx full (v1.2), all rules" according to  <a href="https://github.com/ITxPT/DATA4PTTools/">https://github.com/ITxPT/DATA4PTTools/</a>.
additional_description:
    "cs": Více informací o formátu je na adresách <a href="https://data4pt.org/">https://data4pt.org/</a> a <a href="https://transmodel-cen.eu/">https://transmodel-cen.eu/</a>.
    "en": More information about the format is available at <a href="https://data4pt.org/">https://data4pt.org/</a> and <a href="https://transmodel-cen.eu/">https://transmodel-cen.eu/</a>.
publications:
    pdf: [cs, en]
linked_documents:
    - description:
          cs: W3C XML Schema (XSD)
          en: W3C XML Schema (XSD)
      language: en
      web: https://github.com/NeTEx-CEN/NeTEx-Profile-EPIP
    - description:
          cs: Dokumentace formátu včetně základních konceptů vycházejících z transformace JDV do NeTEx.
          en: Format documentation including basic concepts based on the JDV to NeTEx transformation (Czech only!).
      language: cs
      web: https://portal.cisjr.cz/pub/netex/CISJR_NeTEx.pdf

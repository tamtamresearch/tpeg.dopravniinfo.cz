name:
    "cs": DATEX II - FCD data (předdefinované polohy) v1.1
    "en": DATEX II - FCD data (predefined locations) v1.1
description:
    "cs": Předdefinované polohy, které jsou využívány v publikacích stavových událostí FCD dat, na území celé ČR, na vyžádání poskytované NDIC, v profilu předdefinovaných poloh formátu **DATEX II verze 2.3**.
    "en": Predefined location data used to reference FCD status oriented events, for the whole Czechia, provided by NDIC for download at users request, in a predefined locations profile of **DATEX II model version 2.3**.
additional_description:
    "cs": Datový zdroj popisuje polohu sledovaných úseků pro FCD data, ty jsou založeny na úsecích dle TMC lokační tabulky (LT). Popis polohy je uveden v TMC, OpenLR, poloha podle komunikace a vlastní extenze pro Global Network (GN). Podkladová data (LT, GN) jsou pravidelně aktualizována.
    "en": The data source describes the location of monitored segments for FCD data, which are based on segments defined by the TMC Location Table (LT). Location information is provided in TMC, OpenLR, road-based referencing, and a custom extension for the Global Network (GN). The underlying datasets (LT, GN) are regularly updated.

name:
    "cs": RDS-TMC - Běžné dopravní informace
    "en": RDS-TMC - Common traffic information
description:
    "cs": Vysílání RDS-TMC na stanici **Radiožurnál**. Zjednodušená forma popisu dopravních informací dle normy ALERT-C (ČSN EN 14819-1) na silniční síti vymezené ALERT-C lokační tabulkou.
    "en": Broadcasting RDS-TMC on the station ČRo Radiožurnál. A simplified form of description of traffic information according to the ALERT-C standard (ČSN EN 14819-1) on the road network defined by the ALERT-C location table.
additional_description:
    "cs": Jako datový zdroj je použita publikace DDR - Běžné dopravní informace ([zde](../sources/cz-ndic_ddr-common.md)). Vysílání je automaticky přijímáno a interpretováno v navigačních přístrojích vozidel. Stanice pokrývá celou ČR [zde](https://portal.rozhlas.cz/vysilace/vysilace?stanice=1#/). Používá stejnou verzi lokačních tabulek jako původní zdroj.
    "en": The publication DDR - Common traffic information ([here](../sources/cz-ndic_ddr-common.md)) is used as a data source. The broadcast is automatically received and interpreted in the vehicles' navigation devices. The station is covering the entire Czech Republic [here](https://portal.rozhlas.cz/vysilace/vysilace?stanice=1#/). Uses same location tables as original resource.

name:
    "cs": DATEX II - Hustota provozu (předdefinované polohy) v1.1
    "en": DATEX II - Traffic Status (predefined locations) v1.1
description:
    "cs": Předdefinované polohy, které jsou využívány v publikacích stavových událostí hustota provozu, na území celé ČR, na vyžádání poskytované NDIC, v profilu předdefinovaných poloh formátu **DATEX II verze 2.3**.
    "en": Predefined location data used to reference traffic level status oriented events, for the whole Czechia, provided by NDIC for download at users request, in a predefined locations profile of **DATEX II model version 2.3**.
additional_description:
    "cs": Datový zdroj popisuje polohu sledovaných úseků pro vyhodnocování hustoty provozu, ty jsou v místech úsekových měření a strategických detektorů dopravních parametrů. Poloha je popsána pomocí TMC lokační tabulky (LT), OpenLR, staničením a vlastní extenzí pro Global Network (GN). Podkladová data (LT, GN) jsou pravidelně aktualizována.
    "en": The data source defines the location of monitored segments used for traffic density evaluation. These segments correspond to sites of section-based measurements and strategic detectors of traffic parameters. Location referencing is provided via the TMC Location Table (LT), OpenLR, road stationing, and a custom extension for the Global Network (GN). The underlying datasets (LT, GN) are regularly updated.

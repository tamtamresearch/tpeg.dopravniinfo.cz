name:
    "cs": DATEX II - Běžné dopravní informace (snímek)
    "en": DATEX II - Common Traffic Information (snapshot)
description:
    "cs": Běžné dopravní informace obecného charakteru (nehody atp.), na území celé ČR, poskytované NDIC, na vyžádání jako snímek, v profilu běžné dopravní informace formátu **DATEX II verze 2.3**.
    "en": Common traffic information (accidents etc.), provided by NDIC for the whole Czechia, on request as snapshot, in a common traffic information profile of **DATEX II model version 2.3**.
additional_description:
    "cs": Datový zdroj typu snímek vždy obsahuje všechny aktuálně a v budoucnu platné informace.
    "en": Data source of type snapshot always contains all actual and future traffic information.
content:
    content_type: "dynamic"
    resource_type: "data set"
    dataset:
        category: [Road work, Unexpected road events and conditions, Real-time traffic data]
        detailed_type:
            [
                Long-term road works,
                Short-term road works,
                Accidents and incidents,
                Poor road conditions,
                Weather conditions affecting road surface and visibility,
                Location and length of queues,
            ]
    language: [cs]
pattern:
    name:
        "cs": Rozšířený text profilu pro běžné dopravní informace
        "en": Common Traffic Information extended profile (Czech only)

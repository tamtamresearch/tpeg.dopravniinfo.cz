name:
    "cs": DATEX II - Proměnné dopravní značení (předdefinované polohy) - pevné značení v2
    "en": DATEX II - Variable Message Signs (predefined locations) - fixed signs v2
description:
    "cs": Předdefinované polohy a konfigurace proměnného dopravního značení **na pevných místech (e.g. portály, polo-portály, sloupy, tunely, mosty atp.)** , využívané v dynamické publikaci VMS pro informace o aktuálním stavu značení, na území celé ČR, na vyžádání poskytované NDIC, ve formátu **DATEX II verze 3.6**.
    "en": Predefined location and configuration of Variable Message Signs, **fixed to ground (e.g. portals, half-portals, poles, tunnels, bridges etc.)**, used to reference actual status of VMS, for the whole Czechia, provided by NDIC for download at users request, in a **DATEX II format version 3.6**.
additional_description:
    "cs": Datový zdroj popisuje základní charakteristiky portálu (či jiné statické konstrukce), VMS a konfigurace činné plochy (portálu), včetně polohy a platnosti vůči jízdnímu pruhu. Datová sada je oproti původní verzi rozšířena od VMS pro rychlost 150 km/h, je rozšířeno a aktualizováno schema. Poloha je popsána pomocí souřadnic, staničením a polohou vůči segmentu sítě Global Network (GN). Podkladová data (GN) jsou pravidelně aktualizována.
    "en": The data source describes the core characteristics of the gantry (or another static construction), VMS, and the configuration of the active display area (gantry), including its location and lane-specific applicability. Compared to the previous version, the dataset has been extended to include VMS signs for 150 km/h speed, the schema is updated and extended. Location referencing is provided via coordinates, road stationing, and positioning relative to segments of the Global Network (GN). The underlying GN data is regularly updated.

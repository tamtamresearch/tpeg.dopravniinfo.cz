name:
    "cs": NeTEx - Informace o jízdních řádech
    "en": NeTEx - Timetable information
description:
    "cs": Schválené a aktuálně platné jízdní řády veřejné osobní dopravy předané do Celostátního informačního systému o jízdních řádech, poskytované MD ČR pro celou ČR, ve formátu a struktuře dle normy NeTEx **profilu EPIP**.
    "en": Approved and currently valid timetables of public passenger transport, submitted to the National Timetable Information System, provided by MD ČR for the whole Czechia, in the format and structure according to the NeTEx standard, **EPIP profile**.
additional_description:
    "cs": |
        Jízdní řády zveřejněné v rámci CIS JŘ, převedené z nativního formátu JDF do NeTEx EPIP. Tvořené dvěma zip archivy podle typu dopravy s řadou XML souborů. 

        - **veřejná linková doprava** "NeTEx_VerejnaLinkovaDoprava.zip"
        - **veřejné drážní osobní dopravy na dráze speciální, dráze tramvajové, dráze trolejbusové a dráze lanové** "NeTEx_DrahyMestske.zip".
                       
        Jízdní řády **celostátní vlakové dopravy** zveřejněné v rámci CIS JŘ, převedené z nativního formátu DJŘ_CIS do NeTEx EPIP, tvořené množstvím XML souborů, které se změnami jízdních řádů průběžně přibývají, seskupené v ZIP archivech ve složkách dle období grafikonu vlakové dopravy. Součástí názvů zdrojových i cílových souborů je identifikace (varianty) vlaku. 

        - kmenové JŘ v souborech NeTEx_GVDgggg*.zip, kde gggg je označení GVD letopočtem, může následovat označení pořadí dílčí celostátní změny JŘ v období grafikonu vlakové dopravy,  
        - průběžné změny v kalendářních měsících v souborech NeTEx_GVDgggg_updates _yyyy-MM.zip, kde gggg je označení GVD letopočtem, yyyy je letopočet a MM číslo kalendářního měsíce.

    "en": |
        Timetables published in the CIS JŘ, converted from the native JDF format to NeTEx EPIP. In two zip archives per transport type with a series of XML files. 

        - **public line transport** "NeTEx_PublicLineTransport.zip"
        - **public passenger rail transport on special rail, tramway, trolleybus and cable-way** "NeTEx_DrahyMestske.zip".

        Timetables of nationwide rail transport, published in the framework of the CIS JŘ, converted from the native DJŘ_CIS format to NeTEx EPIP, consisting of a number of XML files, which are continuously added as the timetables are changed, grouped in ZIP archives in folders according to the period of the train grafikon. The names of the source and destination files include the train identification (variant). 

        - main TRs in NeTEx_GVDggg*.zip files, where gggg is the GVD year designation, may be followed by the sequence designation of a partial nationwide change to the timetable  
        - interim changes in calendar months in the files NeTEx_GVDggg_updates _yyy-MM.zip, where gggg is the GVD year designation, yyy is the year and MM is the calendar month number.


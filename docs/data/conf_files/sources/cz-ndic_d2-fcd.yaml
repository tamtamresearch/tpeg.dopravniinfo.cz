name:
    "cs": DATEX II - FCD data
    "en": DATEX II - FCD data
description:
    "cs": Dojezdové doby, rychlosti dopravního proudu, stavy dopravy, zpoždění, kolony včetně údajů o kvalitě vzorku, generované systémem FCD na území celé ČR, poskytované NDIC ve formátu **DATEX II verze 2.3**. Popisy polohy jsou odkázány do DATEX II publikace předdefinovaných poloh.
    "en": Travel times, speed, traffic levels, traffic delays, traffic jam and statistical significance data, provided by NDIC for the whole Czechia, in a **DATEX II format version 2.3**. Location references are pointing to DATEX II predefined location set.

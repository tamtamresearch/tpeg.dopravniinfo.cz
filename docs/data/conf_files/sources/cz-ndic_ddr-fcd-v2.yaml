name:
    "cs": DDR - FCD data v2
    "en": DDR - FCD data v2
description:
    "cs": Dojezdové doby, rychlosti dopravního proudu, stavy dopravy, zpoždění, kolony včetně údajů o kvalitě vzorku, rozdělené dle typu vozidla (na nákladní a osobní), generované systémem FCD na území celé ČR, poskytované NDIC ve formátu DDR NDIC pro FCD data. Popisy polohy jsou odkázány do DATEX II publikace předdefinovaných poloh.
    "en": Travel times, speed, traffic levels, traffic delays, traffic jam and statistical significance data, separated by vehicle type (cars and trucks), provided by NDIC for the whole Czechia, in a DDR NDIC format for FCD data. Location references are pointing to DATEX II predefined location set.
additional_description:
    "cs": Ve verzi 2 jsou nově (oproti verzi 1 ([zde](../sources/cz-ndic_ddr-fcd.md))) výstupní data tj. rychlosti dopravního proudu, počet vozidel, dojezdová doba a zpoždění počítána zvlášť pro osobní a nákladní vozidla, a to jen na komunikacích typu dálnice. Na ostatních komunikacích zůstal výpočet dat stejný.
    "en": In version 2, the output data—namely traffic flow speeds, vehicle counts, travel times, and delays—are newly calculated separately for passenger and freight vehicles, compared to version 1 ([here](../sources/cz-ndic_ddr-fcd.md)). This distinction applies only to motorway-type roads. On other types of roads, the data calculation remains unchanged.

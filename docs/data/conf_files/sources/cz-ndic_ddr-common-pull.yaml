name:
    "cs": DDR - Běžné dopravní informace (snímek)
    "en": DDR - Common Traffic Information (snapshot)
description:
    "cs": Běžné dopravní informace (nehody, uzavírky, práce na silnici...), na území celé ČR, poskytované NDIC, na vyžádání jako snímek, ve formátu DDR NDIC.
    "en": Common traffic information (accidents, closures, roadworks...), without traffic statuses, provided by NDIC for the whole Czechia, on request as snapshot, in a DDR format for common traffic information.
additional_description:
    "cs": Datový zdroj typu snímek vždy obsahuje všechny aktuálně a v budoucnu platné informace.
    "en": Data source of type snapshot always contains all actual and future traffic information.
content:
    content_type: "dynamic"
    resource_type: "data set"
    dataset:
        category: [Road work, Unexpected road events and conditions, Real-time traffic data]
        detailed_type:
            [
                Long-term road works,
                Short-term road works,
                Accidents and incidents,
                Poor road conditions,
                Weather conditions affecting road surface and visibility,
                Location and length of queues,
            ]
    language: [cs]
linked_sources:
    - cz-ndic_tmc-location-table-v11.0
temporal:
    start_date: 2021-06-01
coverage:
    area: CZ0
    network: [Motorways, Arterial road network, Regional roads, Urban and local roads]
transport_modes: [car, truck, motorcycle, bus]
responsibilities:

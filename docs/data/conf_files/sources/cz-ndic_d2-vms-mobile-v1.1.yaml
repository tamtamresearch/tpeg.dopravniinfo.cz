name:
    "cs": DATEX II - Proměnné dopravní značení - vozíky v1.1
    "en": DATEX II - Variable Message Signs - mobile trailers v1.1
description:
    "cs": Informace zobrazené na proměnném dopravním značení **umístěném na mobilních vozících** podél pozemních komunikací za účelem poskytování informací a řízení provozu, na území celé ČR, poskytované NDIC, ve chvíli jejich vzniku, ve formátu **DATEX II verze 3.3**.
    "en": Information displayed on variable message signs **on mobile trailers** along roads for information and traffic management purposes, provided by NDIC for the whole Czechia, pushed on occurrence, in a **DATEX II format version 3.3**.
additional_description:
    "cs": Datový zdroj popisuje právě zobrazované informace na jednotlivých značkách na vozíku včetně změny konfigurace zobrazované plochy a polohy vozíku.
    "en": Data source describes the information currently displayed on the individual signs of mobile trailers including the configuration change of the displayed area and dynamic information about position of the mobile trailer.

    "en": DATEX II - Weather
description:
    "cs": Informace o počasí a sjízdnosti komunikací, na území celé ČR, poskytované NDIC, ve chvíli jejich vzniku, v profilu počasí formátu **DATEX II verze 2.3**. Popisy polohy jsou odkázány do DATEX II publikace předdefinovaných poloh.

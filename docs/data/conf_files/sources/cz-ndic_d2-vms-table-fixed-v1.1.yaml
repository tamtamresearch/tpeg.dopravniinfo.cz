name:
    "cs": DATEX II - Proměnné dopravní značení (předdefinované polohy) - pevné značení v1.1
    "en": DATEX II - Variable Message Signs (predefined locations) - fixed signs v1.1
description:
    "cs": Předdefinované polohy a konfigurace proměnného dopravního značení **na pevných místech (e.g. portály, polo-portály, sloupy, tunely, mosty atp.)** , využívané v dynamické publikaci VMS pro informace o aktuálním stavu značení, na území celé ČR, na vyžádání poskytované NDIC, ve formátu **DATEX II verze 3.3**.
    "en": Predefined location and configuration of Variable Message Signs, **fixed to ground (e.g. portals, half-portals, poles, tunnels, bridges etc.)**, used to reference actual status of VMS, for the whole Czechia, provided by NDIC for download at users request, in a **DATEX II format version 3.3**.
additional_description:
    "cs": Datový zdroj popisuje základní charakteristiky dopravní značky / portálu včetně konfigurace zobrazované plochy (portálu), polohy a platnosti vůči jízdnímu pruhu. Poloha je popsána pomocí souřadnic, staničením a polohou vůči segmentu sítě Global Network (GN). Podkladová data (GN) jsou pravidelně aktualizována.
    "en": Data source describes the basic characteristics of the traffic sign/portal including the configuration of the display area (portal), position and validity relative to the lane. Location referencing is provided via the Coordinate pair, and point along road and point along a segment of Global Network (GN). The underlying datasets (GN) is regularly updated.

name:
    "cs": DATEX II - Parkoviště nákladních vozidel (předdefinované polohy)
    "en": DATEX II - Truck Rest Areas (predefined locations)
description:
    "cs": Předdefinované informace o odpočívkách a parkovištích pro nákladní vozidla, využívané v dynamické publikaci inteligentního parkování, na území celé ČR, na vyžádání poskytované NDIC, ve formátu **DATEX II verze 2.3**.
    "en": Predefined information about truck rest areas, used to reference their actual status, for the whole Czechia, provided by NDIC for download at users request, in a **DATEX II format version 2.3**.
additional_description:
    "cs": |
        Datový zdroj popisuje základní charakteristiky parkovišť, vybavení a poskytované služby,  uspořádání odpočívky, adresu a polohu, včetně informací o individuálních parkovacích místech.

        Polohy odpočívek včetně poloh jednotlivých parkovacích míst jsou také dostupné na [geoportálu ŘSD](https://geoportal.rsd.cz/apps/odpocivky-verejna) a celkové informace včetně služeb ve [webové aplikaci ŘSD](https://www.rsd.cz/mapa-odpocivek#/odpocivky).
    "en": |
        Data source describes the basic characteristics of the rest areas, the facilities and services provided, the layout of the rest area, the address and location, including information on individual parking spaces. 

        Locations of rest areas and individual parking places are also available in [RSD geo portal](https://geoportal.rsd.cz/apps/odpocivky-verejna) and information about equipment, services and number of parking places in [RSD web application](https://www.rsd.cz/mapa-odpocivek#/odpocivky).

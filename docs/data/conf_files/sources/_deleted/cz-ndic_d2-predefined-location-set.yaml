# cz-ndic_d2-predefined-location-set:
# name:
# "cs": DATEX II - Sada předdefinovaných poloh
# "en": DATEX II - Predefined Location Set
# description:
# "cs": Předdefinované polohy, které jsou využívány v publikacích stavových událostí (dojezdové doby, hustota provozu, situace v tunelu, obsazenost parkovišť atp.), na území celé ČR, na vyžádání poskytované NDIC, v profilu předdefinovaných poloh formátu **DATEX II verze 2.3**.
# "en": Predefined location data used to reference status oriented events (travel time, weather station reports, parking, tunnels, etc.), for the whole Czechia, provided by NDIC for download at users request, in a predefined locations profile of **DATEX II model version 2.3**.
# additional_description:
# "cs": Různé verze tohoto zdroje se liší pouze použitím popisované polohy dynamickou publikací a tedy i konkrétními obsaženými polohami. Samotný odběr je parametrizován pomocí hodnoty **pls_key**, která je uvedená u každého dynamického datového zdroje.
# "en": Different instances of this source vary only by usage in dynamic traffic data source, hence in the contained locations. The subscription itself is parametrized by a value of **pls_key** attribute of the respective dynamic data source.

name:
    "cs": LOD - Dopravní informace souvisící s bezpečností silničního provozu pomocí SPARQL
    "en": LOD - Safety-related road traffic information via SPARQL
description:
    "cs": Dopravní informace související s bezpečností silničního provozu z celé ČR dle Nařízení EK [2013/886 - SRTI](https://eur-lex.europa.eu/eli/reg_del/2013/886) dostupná ve formátu otevřených dat, prostřednictvím rozhraní SPARQL.
    "en": Traffic information from the whole Czechia related to road safety according to the EC Regulation [2013/886 - SRTI](https://eur-lex.europa.eu/eli/reg_del/2013/886). available in an open data format via SPARQL interface.
additional_description:
    "cs": |
        Data jsou podmnožinou zdroje dat [DATEX II - Běžné dopravní informace](cz-ndic_d2-common.md).

        Rozhraní SPARQL je služba, která umožňuje provádět dotazy na data uložená v RDF pomocí jazyka SPARQL. Tímto způsobem lze k informacím NDIC přistupovat a transformovat je podle zásad [propojených dat](https://www.w3.org/TR/?filter-tr-name=semantic), což usnadňuje jejich opakované použití.

        Pro provádění dotazů je nutné znát jazyk SPARQL, který definovala organizace W3C [zde](https://www.w3.org/TR/rdf-sparql-query). 
        V katalogu jsou k dispozici údaje (datové soubory) o silnicích, správních jednotkách a událostech.

        Vytvořeno v rámci projektu [CEF 2018-EU-IA-0088](http://cef.uv.es/lodroadtran18) TamTam Research. Podrobná dokumentace zdroje a rozhraní SPARQL je dostupná na [https://lod.tamtamresearch.com/docs](https://lod.tamtamresearch.com/docs)
    "en": |
        The data are a subset of the data source [DATEX II - Common Traffic Information](cz-ndic_d2-common.md)

        The SPARQL interface is a service that allows queries to be made on data stored in RDF using the SPARQL language. In this way, NAP DGT information can be accessed and transformed according to the principles of Linked Data, facilitating its reuse.

        In order to perform queries it is necessary to know the SPARQL language, defined by the W3C here.
        Data (datasets) on roads, administrative units and incidents are available in the catalogue.

        Created in the CEF project [CEF 2018-EU-IA-0088](http://cef.uv.es/lodroadtran18) by TamTam Research. Detailed documentation of the source and the SPARQL interface is at [https://lod.tamtamresearch.com/docs](https://lod.tamtamresearch.com/docs).

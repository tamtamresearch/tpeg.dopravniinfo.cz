name:
    "cs": DATEX II - Hustota provozu
    "en": DATEX II - Traffic Status
description:
    "cs": Hustota provozu (ve významu stupňů provozu, resp. stavu dopravní situace), na území celé ČR, poskytovaná NDIC, ve chvíli jejich vzniku, v profilu hustoty provozu formátu **DATEX II verze 2.3**. Popisy polohy jsou odkázány do DATEX II publikace předdefinovaných poloh.
    "en": Traffic status, provided by NDIC for the whole Czechia, pushed on occurrence, in a traffic status profile of **DATEX II model version 2.3**.  Location references are pointing to DATEX II predefined location set.

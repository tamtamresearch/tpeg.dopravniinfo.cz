cz-ndic_d2-vms-table:
    name:
        "cs": DATEX II - Proměnné dopravní značení (předdefinované polohy)
        "en": DATEX II - Variable Message Signs (predefined locations)
    description:
        "cs": Předdefinované polohy a konfigurace proměnného dopravního značení, využívané v dynamiccé publikaci VMS pro informace o aktuálním stavu značení, na území celé ČR, na vyžádání poskytované NDIC, ve formátu **DATEX II verze 3.3**.
        "en": Predefined location and configuration of Variable Message Signs, used to reference actual status of VMS, for the whole Czechia, provided by NDIC for download at users request, in a **DATEX II format version 3.3**.
    additional_description:
        "cs": Datový zdroj popisuje základní charakteristiky dopravní značky / portálu včetně konfigurace zobrazované plochy (portálu), polohy a platnosti vůči jízdnímu pruhu.
        "en": Data source describes the basic characteristics of the traffic sign/portal including the configuration of the display area (portal), position and validity relative to the lane.
    content:
        content_type: "static"
        resource_type: "data set"
        dataset:
            category: [Dynamic traffic signs and regulations]
            detailed_type: []
        language: [cs]
    temporal:
        start_date: 2022-02-16
    coverage:
        area: CZ0
        network: [Motorways, Arterial road network, Regional roads, Urban and local roads]
    transport_modes: [car, truck, motorcycle, bus]
    responsibilities:
        publisher: cz-ndic
    conditions_of_use:
        contract_or_licence: Contract and Free of charge
        # process for applying for data
        terms_and_conditions: ddrcontract
    access_info:
        formats:
            - cz-ndic_d2-vms-table-v1.0
        protocols:
            - cz-ndic_pull-v1.1
        access_point: ["NDIC/data subscription"]
    quality_information:
        status:
            "cs": "provozní"
            "en": "production"
        status_description:
            "cs": Od 02/2022 v testovacím módu, od 06/2022 v provozním módu.
            "en": From 02/2022 in a test mode, from 06/2022 in production mode.
        update_frequency: Up to every 6month
        quality_assesment:
            "cs": interní procesy kontroly a křížová verifikace
            "en": internal control mechanism and cross validation

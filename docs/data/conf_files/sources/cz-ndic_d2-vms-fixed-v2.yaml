name:
    "cs": DATEX II - Proměnné dopravní značení - pevné v2
    "en": DATEX II - Variable Message Signs - fixed v2
description:
    "cs": Informace zobrazené na proměnném dopravním značení **na pevných místech (e.g. portály, polo-portály, sloupy, tunely, mosty atp.)** podél pozemních komunikací za účelem poskytování informací a řízení provozu, na území celé ČR, poskytované NDIC, ve chvíli jejich vzniku, ve formátu **DATEX II verze 3.3**.
    "en": Information displayed on variable message signs **fixed to ground (e.g. portals, half-portals, poles, tunnels, bridges etc.)** along roads for information and traffic management purposes, provided by NDIC for the whole Czechia, pushed on occurrence, in a **DATEX II format version 3.3**.
additional_description:
    "cs": Ve verzi 2 jsou nově (oproti verzi 1.1 ([zde](../sources/cz-ndic_d2-vms-fixed-v1.1.md))) přítomny informace o VMS 150 km/h, a stavy jsou odkazovány do rozšířené předdefinované statické datové sady. Tato verze má také rozšířenou a korigovanou dokumentaci.
    "en": In version 2, new information on 150 km/h VMS signs is included, compared to version 1.1 (([here](../sources/cz-ndic_d2-vms-fixed-v1.1.md)))). The status values are linked to an extended predefined static dataset. This version also features expanded and corrected documentation.
